spring:
  application:
    name: AuthSystem
  datasource:
    url: jdbc:postgresql://localhost:5431/authdb
    username: postgres
    password: salman
    driver-class-name: org.postgresql.Driver 

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8081

logging:
  level:
    root: INFO
    org.springframework: DEBUG
    org.hibernate: DEBUG
